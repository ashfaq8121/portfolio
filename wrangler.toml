[vars]
OWNER_NAME = "Ashfaq ur Rahman"
TO_EMAIL = "urrahmanmohammadashfaq@gmail.com"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "75f6221e15ef407eb6460f2c9878b431"
preview_id = "75f6221e15ef407eb6460f2c9878b431"

[[kv_namespaces]]
binding = "SESSION"
id = "3fac65c2f32f4818acaae9527df401a2"
# This is the real "portfolio-session" namespace from the Cloudflare
# dashboard (Workers KV). The id was missing entirely before, which is
# invalid config and crashed the ENTIRE Worker on boot — every route, not
# just /api/chat. That's why all 21 evals failed identically with "Could
# not get an answer": nothing was running to answer anything.
#
# No preview_id set — Wrangler will auto-create a `_preview` copy of this
# namespace the first time you run `wrangler dev` (needs network access to
# Cloudflare). If you'd rather pin it explicitly, run:
#   npx wrangler kv namespace create SESSION --preview
# and paste the id it prints back as preview_id here.

[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "b2a7c764-7910-4ff4-986e-132b5d8d34b9"

