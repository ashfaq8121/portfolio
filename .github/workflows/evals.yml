# .github/workflows/evals.yml

name: Evals

on:
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Create dist directory for assets
        run: mkdir -p dist

      - name: Start wrangler dev
        run: npx wrangler dev --port 4321 --local > wrangler.log 2>&1 &
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for dev server
        run: |
          sleep 10
          cat wrangler.log
          for i in {1..30}; do
            if curl -s http://localhost:4321 > /dev/null; then
              echo "✅ Server is up!"
              exit 0
            fi
            echo "⏳ Waiting... attempt $i"
            sleep 2
          done
          echo "❌ Server failed to start. Full log:"
          cat wrangler.log
          exit 1
        shell: bash

      - name: Show wrangler dev log
        if: always()
        run: cat wrangler.log || echo "(no wrangler.log found)"

      - name: Run evals
        run: npm run evals
        continue-on-error: true
        env:
          CHAT_ENDPOINT: http://localhost:4321
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md

      - name: Upload wrangler dev log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-log
          path: wrangler.log