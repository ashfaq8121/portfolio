# .github/workflows/evals.yml

name: Evals

on:
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Real build — NOT a bare `mkdir -p dist`. Without a real build,
      # wrangler dev has no actual entrypoint to serve, so it falls back
      # to a blank placeholder worker that (obviously) doesn't export
      # ContactRateLimiter, causing:
      #   "Your Worker depends on the following Durable Objects, which
      #    are not exported in your entrypoint file: ContactRateLimiter"
      # `npm run build` also runs scripts/fix-durable-objects.mjs, which
      # patches the built entry so the DO class is actually exported —
      # same as the real production build and the Playwright test setup.
      - name: Build app
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Clear local DO SQLite state before starting wrangler dev — the
      # build step's internal Astro/Vite Miniflare sync and this wrangler
      # dev command can be backed by different bundled workerd versions,
      # and both default to writing local DO state into the same
      # .wrangler/state folder. Starting wrangler dev with stale state
      # from a different workerd version causes a hard crash (SQLite
      # schema mismatch) instead of a clean startup. See playwright.config.ts
      # for the same fix applied to the E2E test server.
      - name: Clear stale local Durable Object state
        run: rm -rf .wrangler/state

      - name: Start wrangler dev
        run: npx wrangler dev --port 4321 --local > wrangler.log 2>&1 &
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for dev server
        run: |
          sleep 10
          cat wrangler.log
          for i in {1..30}; do
            if curl -s http://localhost:4321 > /dev/null; then
              echo "✅ Server is up!"
              exit 0
            fi
            echo "⏳ Waiting... attempt $i"
            sleep 2
          done
          echo "❌ Server failed to start. Full log:"
          cat wrangler.log
          exit 1
        shell: bash

      - name: Show wrangler dev log
        if: always()
        run: cat wrangler.log || echo "(no wrangler.log found)"

      - name: Run evals
        run: npm run evals
        continue-on-error: true
        env:
          CHAT_ENDPOINT: http://localhost:4321
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md

      - name: Upload wrangler dev log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-log
          path: wrangler.log