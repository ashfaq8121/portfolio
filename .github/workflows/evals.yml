# .github/workflows/evals.yml

name: Evals

on:
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # ========== REPLACE THESE TWO STEPS ==========
      - name: Start wrangler dev
        run: npx wrangler dev --port 4321 > wrangler.log 2>&1 &
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for dev server
        run: sleep 5 && cat wrangler.log
        shell: bash

      - name: Actually wait for server
        run: npx wait-on http://localhost:4321 --timeout 60000
      # ==============================================

      - name: Show wrangler dev log
        if: always()
        run: cat wrangler.log || echo "(no wrangler.log found)"

      - name: Run evals
        run: npm run evals
        continue-on-error: true
        env:
          CHAT_ENDPOINT: http://localhost:4321
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md

      - name: Upload wrangler dev log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-log
          path: wrangler.log