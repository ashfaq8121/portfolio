# .github/workflows/evals.yml

name: Evals

on:
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: |
          nohup npm run dev > dev-server.log 2>&1 &
          echo "Started dev server in background (PID $!)"
          sleep 20
          echo "----- dev-server.log (first 50 lines) -----"
          head -n 50 dev-server.log || echo "(no log yet)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for dev server
        run: npx wait-on http://localhost:4321 --timeout 120000

      - name: Show dev server log if startup failed
        if: failure()
        run: |
          echo "----- dev-server.log -----"
          cat dev-server.log || echo "(no log file found)"

      - name: Run evals
        run: npm run evals
        continue-on-error: true
        env:
          CHAT_ENDPOINT: http://localhost:4321
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md
          if-no-files-found: warn

      - name: Upload dev server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: dev-server.log
          if-no-files-found: warn