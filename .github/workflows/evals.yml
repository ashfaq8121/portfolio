# .github/workflows/evals.yml
#
# Runs the eval suite against a live `wrangler dev --remote` instance on
# every pull request. Deliberately informational, not merge-blocking —
# see DECISIONS.md for the reasoning (AI call cost/latency shouldn't gate
# every PR the way unit tests do).
#
# IMPORTANT: do NOT add "evals" as a required status check in the GitHub
# branch protection settings for `main` — that would make it merge-blocking
# again, defeating the point of `continue-on-error` below.

name: Evals

on:
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start wrangler dev (remote, so the AI binding actually works)
        run: |
          nohup npx wrangler dev --remote --port 4321 > wrangler-dev.log 2>&1 &
          echo "Started wrangler dev in background (PID $!)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for dev server
        run: npx wait-on http://localhost:4321 --timeout 120000

      - name: Show wrangler dev log if startup failed
        if: failure()
        run: |
          echo "----- wrangler-dev.log -----"
          cat wrangler-dev.log || echo "(no log file found)"

      - name: Run evals
        run: npm run evals
        continue-on-error: true
        env:
          CHAT_ENDPOINT: http://localhost:4321
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md
          if-no-files-found: warn

      - name: Upload wrangler dev log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-dev-log
          path: wrangler-dev.log
          if-no-files-found: warn