name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .dev.vars for CI
        run: |
          echo "PUBLIC_TURNSTILE_SITE_KEY=1x00000000000000000000AA" >> .dev.vars
          echo "TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA" >> .dev.vars
          echo "PUBLIC_WEB3FORMS_KEY=${{ secrets.PUBLIC_WEB3FORMS_KEY }}" >> .dev.vars

      - name: Run Playwright E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30